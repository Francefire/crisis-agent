# Column-role configuration for the "Analyste" agent.
# Schema-driven: the deterministic tools read column ROLES from here, never
# hard-coded column names, so the same agent runs on any tweet corpus.
# To adapt to a new dataset, remap the right-hand column names below.

# Optional LLM policy. `provider_priority` sets the order providers are tried
# (best-first); each run's key-rotation/fallback walks it, so one run can span
# several providers' quotas. Env LLM_PROVIDER_PRIORITY overrides this; if both are
# absent it falls back to [LLM_PROVIDER, LLM_FALLBACK_PROVIDER]. Model candidates,
# per-provider keys, and scores live in providers.py / .env — not here.
# llm:
#   provider_priority: [deepseek, groq, mistral, gemini]

dataset:
  path: Dataset/data.xlsx        # relative to project root
  # sheet: 0                     # optional; default first sheet

columns:
  id: postID                     # unique message id
  timestamp: Date                # message datetime
  author: Author                 # posting account handle
  text_raw: Full Text            # original text (for display / sampling)
  text_clean: message_normalizer # normalized text (for NLP / dedup)
  engagement: Engagement Type    # RETWEET / REPLY / QUOTE / ORIGINAL
  repost_url: X Repost of        # URL of the reposted original (holds amplified handle)
  reply_to: X Reply to           # handle this message replies to
  sentiment: Sentiment           # negative / neutral / positive
  verified: X Verified           # account verified flag
  followers: X Followers
  following: X Following
  posts: X Posts
  reach: Reach
  impressions: Impressions
  likes: Likes
  comments: Comments
  shares: Shares

values:
  engagement_retweet: RETWEET
  engagement_original: ORIGINAL
  # values in `verified` that count as "verified true"
  verified_true: ["true", "1", "1.0", "yes"]

# Regex to extract the amplified account handle from `repost_url`.
# Group 1 must capture the handle.
repost_handle_regex: 'twitter\.com/([^/]+)/status'

